trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: BuildAndScan
    displayName: Build and Security Scan
    jobs:
      - job: PythonChecks
        displayName: Python Lint, Test, Security, and Dependency Checks
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.11'

          - script: |
              python -m pip install --upgrade pip
              pip install -r requirements.txt
            displayName: Install dependencies

          - script: |
              ruff check .
            displayName: Run ruff linting

          - script: |
              pytest
            displayName: Run unit tests

          - script: |
              bandit -r app
            displayName: Run Bandit security scan

          - script: |
              pip-audit
            displayName: Run pip-audit dependency scan

          - script: |
              python app/main.py
            displayName: Run application